services:
  mongo:
    image: mongo:7.0
    container_name: mi_app_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    restart: unless-stopped

  app:
    build: ./StateMachine
    container_name: mi_app_fastapi
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      DEBUG: ${DEBUG}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      PROJECT_NAME: ${PROJECT_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      PYTHONPATH: /app
    depends_on:
      - mongo
    volumes:
      - ./StateMachine/app:/app/app
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: mi_app_frontend
    ports:
      - "5173:80"
    volumes:
      - ./state_machine_frontend/dist:/usr/share/nginx/html
      - ./state_machine_frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app_network
    restart: unless-stopped

volumes:
  mongo_data:
    name: mi_app_mongo_data

networks:
  app_network:
    driver: bridge